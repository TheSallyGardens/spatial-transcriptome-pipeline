# plugins/cell_communication/config.yaml
name: cell_communication
version: "1.0"
description: "细胞间通讯分析"
methods:
  - cellchat
  - squidpy
  - nichenet

method_descriptions:
  cellchat: |
    CellChat: 基于配体-受体对的空间通讯分析
    完整版需要R环境。
    安装: R + remotes::install_github("sqjin/CellChat")
    Python实现使用Squidpy作为替代。

  squidpy: |
    Squidpy: Python原生空间分析库，包含通讯分析功能
    安装: pip install squidpy

  nichenet: |
    NicheNet: 基于网络的空间通讯分析
    完整版需要R环境。
    安装: R + remotes::install_github("saeyslab/nichenetr")
    Python实现使用通路分析作为替代。

required_packages:
  python:
    - squidpy>=1.2.0
    - scanpy>=1.9.0
    - anndata>=0.8.0
    - pandas>=1.5.0
    - numpy>=1.23.0
  R:
    - CellChat: remotes::install_github("sqjin/CellChat")
    - NicheNet: remotes::install_github("saeyslab/nichenetr")

input:
  - type: anndata
    required: true
    description: "带细胞注释的空间转录组数据"

output:
  - type: anndata
    path: "{result_dir}/data/cellchat_adata.h5ad"
  - type: figure
    path: "{result_dir}/visualization/cell_communication_{method}.png"

default_params:
  min_cells: 10
