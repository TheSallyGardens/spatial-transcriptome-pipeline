# plugins/scRNA_joint_analysis/config.yaml
name: scRNA_joint_analysis
version: "1.0"
description: "与单细胞RNA-seq联合分析"
methods:
  - seurat
  - cell2location
  - spatialglue

method_descriptions:
  seurat: |
    Seurat V5: 最新的Seurat版本，支持标签迁移
    注意: 需要R环境的Seurat 5.x
    安装:
    - R 4.3+
    - R> remotes::install_github("satijalab/seurat", "seurat5")
    - R> install.packages('SeuratObject')
    Python实现使用KNN标签迁移作为替代。

  cell2location: |
    cell2location: 贝叶斯空间解卷积方法
    安装: pip install cell2location scvi-tools

  spatialglue: |
    SpatialGlue: 图神经网络多模态整合
    安装: pip install spatialglue

required_packages:
  python:
    - scanpy>=1.9.0
    - anndata>=0.8.0
    - pandas>=1.5.0
    - numpy>=1.23.0
    - scikit-learn>=1.2.0
  R:
    - Seurat 5.x:
      - R> remotes::install_github("satijalab/seurat", "seurat5")
      - R> install.packages('SeuratObject')
  optional:
    - cell2location: pip install cell2location scvi-tools
    - spatialglue: pip install spatialglue

input:
  - type: anndata
    required: true
    description: "空间转录组数据"
  - type: anndata
    required: false
    description: "单细胞RNA-seq参考数据"

output:
  - type: anndata
    path: "{result_dir}/data/scRNA_joint_adata.h5ad"
  - type: figure
    path: "{result_dir}/visualization/scRNA_joint_{method}.png"

default_params:
  reference: "panglaodb"
  k_weight: 30
